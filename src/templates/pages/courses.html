{% extends "base.html" %}
{% block content %}
<div class="p-6 max-w-5xl mx-auto">

    <div class="flex items-center gap-3 mb-6">
        <input type="text" placeholder="Search courses…"
        class="border border-gray-200 rounded-lg px-3 py-2 text-sm w-72 focus:outline-none focus:ring-2 focus:ring-blue-100" />
        <select class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none">
            <option>All subjects</option>
        </select>
        <button class="ml-auto text-sm border border-gray-200 rounded-lg px-4 py-2 hover:bg-gray-50">
            + Add course
        </button>
    </div>

    {% for group in groups %}
        {% include "components/course_card.html" %}
    {% endfor %}

</div>
{% endblock %}
